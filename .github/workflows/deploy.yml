name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      # Project sites are served from https://<owner>.github.io/<repo>/
      - run: npm run build -- --base=/${{ github.event.repository.name }}/
      # Pages must be set to serve from the gh-pages branch (one-time setting:
      # Settings -> Pages -> Source: Deploy from a branch -> gh-pages / root).
      # The Actions token cannot change that setting itself.
      - name: Publish dist to gh-pages branch
        run: |
          touch dist/.nojekyll
          cd dist
          git init -b gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Deploy ${GITHUB_SHA::7}"
          git push --force "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" gh-pages
